<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Фон -->
  <rect width="64" height="64" rx="12" fill="#080f1c"/>
  <!-- Рамка вікна -->
  <rect x="10" y="10" width="44" height="38" rx="3" fill="none" stroke="#c8a96e" stroke-width="3"/>
  <!-- Горизонтальний перехрестя -->
  <line x1="10" y1="29" x2="54" y2="29" stroke="#c8a96e" stroke-width="2"/>
  <!-- Вертикальний перехрестя -->
  <line x1="32" y1="10" x2="32" y2="48" stroke="#c8a96e" stroke-width="2"/>
  <!-- Відблиск скла -->
  <line x1="14" y1="14" x2="20" y2="14" stroke="rgba(200,169,110,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="17" y2="18" stroke="rgba(200,169,110,0.25)" stroke-width="1" stroke-linecap="round"/>
  <!-- Підвіконня -->
  <rect x="7" y="48" width="50" height="5" rx="2" fill="#c8a96e"/>
</svg>
